<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:16px; background:#fff; font-family:var(--font-sans); }
  .row { display:flex; gap:10px; align-items:stretch; flex-wrap:wrap; }
  .sw { display:flex; flex-direction:column; gap:6px; min-width:88px; }
  .chip { height:64px; border-radius:var(--radius-md); border:1px solid var(--border-1); }
  .lbl { font-size:11px; color:var(--text-3); font-family:var(--font-mono); }
  .hex { font-size:11px; color:var(--text-2); font-family:var(--font-mono); font-weight:500; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#f9fafb"></div><div class="lbl">gray-50</div><div class="hex">#f9fafb</div></div>
  <div class="sw"><div class="chip" style="background:#f3f4f6"></div><div class="lbl">gray-100</div><div class="hex">#f3f4f6</div></div>
  <div class="sw"><div class="chip" style="background:#e5e7eb"></div><div class="lbl">gray-200</div><div class="hex">#e5e7eb</div></div>
  <div class="sw"><div class="chip" style="background:#d1d5db"></div><div class="lbl">gray-300</div><div class="hex">#d1d5db</div></div>
  <div class="sw"><div class="chip" style="background:#9ca3af"></div><div class="lbl">gray-400</div><div class="hex">#9ca3af</div></div>
  <div class="sw"><div class="chip" style="background:#6b7280"></div><div class="lbl">gray-500</div><div class="hex">#6b7280</div></div>
  <div class="sw"><div class="chip" style="background:#4b5563"></div><div class="lbl">gray-600</div><div class="hex">#4b5563</div></div>
  <div class="sw"><div class="chip" style="background:#374151"></div><div class="lbl">gray-700</div><div class="hex">#374151</div></div>
  <div class="sw"><div class="chip" style="background:#1f2937"></div><div class="lbl">gray-800</div><div class="hex">#1f2937</div></div>
  <div class="sw"><div class="chip" style="background:#111827"></div><div class="lbl">gray-900</div><div class="hex">#111827</div></div>
</div>
</body></html>
