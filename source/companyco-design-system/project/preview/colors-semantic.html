<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:16px; background:#fff; font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; }
  .chip { padding:10px 12px; border-radius:var(--radius-md); border:1px solid; font-size:12px; font-weight:500; display:flex; flex-direction:column; gap:4px; }
  .lbl { font-family:var(--font-mono); font-size:10px; opacity:.8; }
  .healthy  { background:#dcfce7; border-color:#86efac; color:#166534; }
  .warning  { background:#fef9c3; border-color:#fde68a; color:#92400e; }
  .critical { background:#fef2f2; border-color:#fca5a5; color:#991b1b; }
  .info     { background:#dbeafe; border-color:#93c5fd; color:#1e40af; }
  .unknown  { background:var(--surface-2); border-color:var(--border-1); color:var(--text-3); }
  .accent   { background:#eef2ff; border-color:#c7d2fe; color:#4f46e5; }
</style>
</head>
<body>
<div class="grid">
  <div class="chip healthy">Success / Healthy<span class="lbl">#22c55e</span></div>
  <div class="chip warning">Warning<span class="lbl">#f59e0b · #d97706</span></div>
  <div class="chip critical">Error / Critical<span class="lbl">#ef4444 · #dc2626</span></div>
  <div class="chip info">Info<span class="lbl">#2563eb</span></div>
  <div class="chip unknown">Neutral / Unknown<span class="lbl">#94a3b8</span></div>
  <div class="chip accent">Accent<span class="lbl">#4f46e5</span></div>
</div>
</body></html>
