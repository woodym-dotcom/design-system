<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px; background:#fff; font-family:var(--font-sans); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .btn { appearance:none; display:inline-flex; align-items:center; justify-content:center; gap:6px; min-height:36px; padding:0 12px; border-radius:6px; font:inherit; font-size:14px; font-weight:500; cursor:pointer; border:1px solid var(--border-1); transition:all 120ms ease; }
  .primary { background:#4f46e5; border-color:#4f46e5; color:#fff; }
  .secondary { background:#fff; color:var(--text-1); }
  .ghost { background:transparent; border-color:transparent; color:var(--text-2); }
  .disabled { opacity:.5; cursor:not-allowed; }
  .icon { min-width:36px; padding:0; }
  svg { width:16px; height:16px; }
</style>
</head>
<body>
  <button class="btn primary">Sign in</button>
  <button class="btn secondary">Cancel</button>
  <button class="btn ghost">Skip</button>
  <button class="btn primary disabled">Signing in…</button>
  <button class="btn secondary icon" aria-label="Close"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M5 5l10 10M15 5L5 15"/></svg></button>
</body></html>
