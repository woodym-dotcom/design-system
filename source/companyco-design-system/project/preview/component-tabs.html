<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px; background:#fff; font-family:var(--font-sans); }
  .tabs { display:flex; border-bottom:1px solid var(--border-1); }
  .tab { padding:10px 16px; border-bottom:2px solid transparent; color:var(--text-3); font-size:14px; font-weight:500; cursor:pointer; }
  .tab:hover { color:var(--text-1); }
  .tab.active { color:#4f46e5; border-bottom-color:#4f46e5; }
</style>
</head>
<body>
  <div class="tabs">
    <div class="tab active">Overview</div>
    <div class="tab">People</div>
    <div class="tab">Relationships</div>
    <div class="tab">Change log</div>
  </div>
</body></html>
