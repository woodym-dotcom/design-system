<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:16px; background:#fff; font-family:var(--font-sans); display:flex; flex-direction:column; gap:6px; }
  .row { display:grid; grid-template-columns: 60px 1fr 70px; align-items:center; gap:12px; }
  .bar { background:#4f46e5; height:14px; border-radius:3px; }
  .name { font-family:var(--font-mono); font-size:11px; color:var(--text-3); }
  .px { font-family:var(--font-mono); font-size:10px; color:var(--text-4); text-align:right; }
</style>
</head>
<body>
  <div class="row"><div class="name">space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="name">space-2</div><div class="bar" style="width:6px"></div><div class="px">6px</div></div>
  <div class="row"><div class="name">space-3</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="name">space-4</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="name">space-5</div><div class="bar" style="width:16px"></div><div class="px">16px · panel pad</div></div>
  <div class="row"><div class="name">space-6</div><div class="bar" style="width:24px"></div><div class="px">24px · modal</div></div>
  <div class="row"><div class="name">space-7</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="name">space-8</div><div class="bar" style="width:48px"></div><div class="px">48px · auth</div></div>
</body></html>
