<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px; background:#fff; font-family:var(--font-sans); color:var(--text-1); }
  .eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:.08em; font-weight:500; color:var(--text-4); }
  h2 { margin:4px 0 2px; font-size:18px; font-weight:600; letter-spacing:-.02em; }
  p { margin:0; color:var(--text-3); font-size:14px; }
  .meta { margin-top:10px; font-family:var(--font-mono); font-size:10px; color:var(--text-4); }
</style>
</head>
<body>
  <span class="eyebrow">HOME</span>
  <h2>Actions</h2>
  <p>Items across the system that need your attention.</p>
  <div class="meta">.section-header + .eyebrow · sentence case · second person</div>
</body></html>
