<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CompanyCo UI Kit — Showcase</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="kit.css">
<link rel="stylesheet" href="auth.css">
<style>
  .showcase { padding: 0; }
  .showcase__nav { position: sticky; top: 0; display: flex; gap: 0; padding: 0 24px; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border-1); z-index: 10; }
  .showcase__nav a { padding: 14px 16px; border-bottom: 2px solid transparent; color: var(--text-3); font-size: 14px; font-weight: 500; text-decoration: none; }
  .showcase__nav a:hover { color: var(--text-1); }
  .showcase__section { padding: 32px 24px; border-bottom: 1px solid var(--border-1); }
  .showcase__section h2 { margin: 0 0 4px; font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .showcase__section p.lede { margin: 0 0 20px; color: var(--text-3); font-size: 14px; }
  .showcase__grid { display: grid; gap: 16px; }
  .showcase__grid--2 { grid-template-columns: 1fr 1fr; }
  .showcase__row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .showcase__auth-frame { height: 620px; border: 1px solid var(--border-1); border-radius: 12px; overflow: hidden; position: relative; }
  .showcase__shell-frame { height: 620px; border: 1px solid var(--border-1); border-radius: 12px; overflow: hidden; position: relative; }
  .showcase__shell-frame .cc-shell { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="showcase.jsx"></script>
</body>
</html>
