<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CompanyCo · Vendors</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <link rel="stylesheet" href="../../brands/companyco.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    body { background: var(--surface-0); }
    #root { height: 100vh; }
  </style>
</head>
<body data-screen-label="01 Vendors list">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="./data.js"></script>
  <script type="text/babel" src="./Shell.jsx"></script>
  <script type="text/babel" src="./ListPage.jsx"></script>
  <script type="text/babel" src="./DetailPane.jsx"></script>

  <script type="text/babel">
    const { useState, useMemo } = React;

    function App() {
      const [nav, setNav] = useState("vendors");
      const [active, setActive] = useState(new Set(["active", "review"]));
      const [selected, setSelected] = useState("v2");
      const [checked, setChecked] = useState(new Set());
      const [paneWidth, setPaneWidth] = useState(420);
      const [paneFullscreen, setPaneFullscreen] = useState(false);

      const filtered = useMemo(() => {
        if (active.size === 0) return VENDORS;
        const byField = {};
        for (const id of active) {
          const c = FILTER_CHIPS.find(x => x.id === id);
          if (!c) continue;
          byField[c.field] = byField[c.field] || new Set();
          byField[c.field].add(c.value);
        }
        return VENDORS.filter(v => {
          for (const [field, set] of Object.entries(byField)) {
            if (!set.has(v[field])) return false;
          }
          return true;
        });
      }, [active]);

      const toggleFilter = id => {
        setActive(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      };
      const toggleCheck = id => {
        setChecked(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      };

      const selectedVendor = filtered.find(v => v.id === selected) || VENDORS.find(v => v.id === selected);
      const paneOpen = !!selectedVendor;

      // When fullscreen, the pane covers the whole list area (1fr).
      // When normal, the page is a 2-column grid: 1fr | paneWidth.
      const gridTemplate = !paneOpen
        ? "1fr"
        : paneFullscreen
          ? "0fr 1fr"            // collapse the list to 0 width
          : `1fr ${paneWidth}px`;

      return (
        <Shell
          activeNav={nav}
          onNavChange={setNav}
          breadcrumbs={[
            "Risk & alerting",
            { vendors: "Vendors", alerts: "Alerts", obligations: "Obligations", audit: "Audit log", filings: "Filings" }[nav] || nav,
          ]}
        >
          <div style={{
            display: "grid", gridTemplateColumns: gridTemplate,
            height: "100%", minHeight: 0,
            transition: "grid-template-columns 180ms ease",
          }}>
            <div style={{
              padding: "20px 24px",
              overflow: paneFullscreen ? "hidden" : "auto",
              minWidth: 0,
            }}>
              <PageHeader title="Vendors" count={filtered.length} />
              <FilterBar
                active={active}
                onToggle={toggleFilter}
                onClear={() => setActive(new Set())}
              />
              <VendorTable
                rows={filtered}
                selected={selected}
                onSelect={setSelected}
                onCheck={toggleCheck}
                checked={checked}
              />
            </div>

            <DetailPane
              vendor={selectedVendor}
              width={paneWidth}
              onWidthChange={setPaneWidth}
              fullscreen={paneFullscreen}
              onFullscreenChange={setPaneFullscreen}
              onClose={() => { setSelected(null); setPaneFullscreen(false); }}
            />
          </div>

          {checked.size > 0 && (
            <div style={{
              position: "fixed", bottom: 18, left: "50%", transform: "translateX(-50%)",
              display: "inline-flex", alignItems: "center", gap: 10,
              padding: "6px 6px 6px 14px", borderRadius: "var(--radius-md)",
              background: "var(--surface-0)", border: "1px solid var(--border-1)",
              boxShadow: "var(--shadow-2)", zIndex: 50,
            }}>
              <span style={{ fontWeight: 500, color: "var(--text-2)", fontSize: 13 }}>{checked.size} vendor{checked.size === 1 ? "" : "s"} selected</span>
              <span style={{ width: 1, height: 20, background: "var(--border-1)" }} />
              <button className="cc-btn cc-btn--primary cc-btn--sm">Mark reviewed</button>
              <button className="cc-btn cc-btn--ghost cc-btn--sm">Assign…</button>
              <button className="cc-btn cc-btn--ghost cc-btn--sm">Export</button>
              <span style={{ width: 1, height: 20, background: "var(--border-1)" }} />
              <button className="cc-btn cc-btn--ghost cc-btn--icon" aria-label="Clear" onClick={() => setChecked(new Set())}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>
          )}
        </Shell>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
